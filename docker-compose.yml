services:  
  orders:
    build:
      context: .
      dockerfile: ./apps/orders/Dockerfile
      target: development
    command: npm run start:dev orders
    environment:
      - PORT=3949
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
    env_file:
      - apps/orders/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      - mongodb-primary
      - mongodb-secondary
      - mongodb-arbiter
      - billing
      - auth
      - rabbitmq
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3949:3949'
      
  billing:
    build:
      context: .
      dockerfile: ./apps/billing/Dockerfile
      target: development
    command: npm run start:dev billing
    environment:
      - PORT=3951
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
    env_file:
      - apps/billing/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      - mongodb-primary
      - mongodb-secondary
      - mongodb-arbiter
      - rabbitmq
      - auth
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3951:3951'

  auth:
    build:
      context: .
      dockerfile:  ./apps/auth/Dockerfile
      target: development
    command: npm run start:dev auth
    environment:
      - PORT=3950
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
    env_file:
      - apps/auth/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      - mongodb-primary
      - mongodb-secondary
      - mongodb-arbiter
      - rabbitmq
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3950:3950'

  rabbitmq:
    image: rabbitmq
    ports:
      - '5673:5672'

  mongodb-primary:
    image: mongo:5.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/keyfile"]
    secrets:
      - mongodb_root_username
      - mongodb_root_password
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongodb_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
      - 'mongodb_master_data:/data/db'
      - ./mongo-keyfile:/data/keyfile
    ports:
      - '27017:27017'

  mongodb-secondary:
    image: mongo:5.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/keyfile"]
    depends_on:
      - mongodb-primary
    secrets:
      - mongodb_uri
      - mongodb_root_username
      - mongodb_root_password
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongodb_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
     - ./mongo-keyfile:/data/keyfile

  mongodb-arbiter:
    image: mongo:5.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/keyfile"]
    depends_on:
      - mongodb-primary
    secrets:
      - mongodb_uri
      - mongodb_root_username
      - mongodb_root_password
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongodb_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
      - ./mongo-keyfile:/data/keyfile

volumes:
  mongodb_master_data:
    driver: local

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  mongodb_uri:
    file: ./secrets/mongodb_uri.txt
  mongodb_root_username:
    file: ./secrets/mongodb_root_username.txt
  mongodb_root_password:
    file: ./secrets/mongodb_root_password.txt