services:  
  orders:
    build:
      context: .
      dockerfile: ./apps/orders/Dockerfile
      target: development
    command: pnpm run start:dev orders
    environment:
      - PORT=3949
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
    env_file:
      - apps/orders/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      billing:
        condition: service_started
      auth:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3949:3949'
      
  billing:
    build:
      context: .
      dockerfile: ./apps/billing/Dockerfile
      target: development
    command: pnpm run start:dev billing
    environment:
      - PORT=3951
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
    env_file:
      - apps/billing/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
      auth:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3951:3951'

  auth:
    build:
      context: .
      dockerfile:  ./apps/auth/Dockerfile
      target: development
    command: pnpm run start:dev auth
    environment:
      - PORT=3950
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
    env_file:
      - apps/auth/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3950:3950'

  listings:
    build:
      context: .
      dockerfile: ./apps/listings/Dockerfile
      target: development
    command: pnpm run start:dev listings
    environment:
      - PORT=3952
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
    env_file:
      - apps/listings/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
      auth:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3952:3952'

  markets:
    build:
      context: .
      dockerfile: ./apps/markets/Dockerfile
      target: development
    command: pnpm run start:dev markets
    environment:
      - PORT=3953
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
    env_file:
      - apps/markets/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
      auth:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3953:3953'

  messages:
    build:
      context: .
      dockerfile: ./apps/messages/Dockerfile
      target: development
    command: pnpm run start:dev messages
    environment:
      - PORT=3954
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
    env_file:
      - apps/messages/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
      auth:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3954:3954'

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5673:5672"   # AMQP
      - "15672:15672" # HTTP UI

  mongodb-primary:
    image: mongo:5.0
    command:
      [
        "mongod",
        "--replSet", "rs0",
        "--bind_ip_all",
        "--keyFile", "/data/keyfile"
      ]
    secrets:
      - mongodb_root_username
      - mongodb_root_password
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongodb_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
      - 'mongodb_master_data:/data/db'
      - ./mongo-keyfile:/data/keyfile
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    ports:
      - '27017:27017'
    healthcheck:
      # Use a simple ping to avoid failing before replica set initializes
      test: ["CMD-SHELL", "mongosh --username root --password password123 --authenticationDatabase admin --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  mongodb-secondary:
    image: mongo:5.0
    command:
      [
        "mongod",
        "--replSet", "rs0",
        "--bind_ip_all",
        "--keyFile", "/data/keyfile"
      ]
    depends_on:
      - mongodb-primary
    secrets:
      - mongodb_uri
      - mongodb_root_username
      - mongodb_root_password
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongodb_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
     - ./mongo-keyfile:/data/keyfile

  mongodb-arbiter:
    image: mongo:5.0
    command:
      [
        "mongod",
        "--replSet", "rs0",
        "--bind_ip_all",
        "--keyFile", "/data/keyfile"
      ]
    depends_on:
      - mongodb-primary
    secrets:
      - mongodb_uri
      - mongodb_root_username
      - mongodb_root_password
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongodb_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
      - ./mongo-keyfile:/data/keyfile

  frontend:
    build:
      context: ./apps/frontend
      target: development
      args:
        - NODE_OPTIONS=--max-old-space-size=1024
    command: pnpm dev
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--max-old-space-size=2048
    depends_on:
      - auth
      - listings
      - orders
      - billing
      - messages
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    # Performance and stability improvements
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_master_data:
    driver: local

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  mongodb_uri:
    file: ./secrets/mongodb_uri.txt
  mongodb_root_username:
    file: ./secrets/mongodb_root_username.txt
  mongodb_root_password:
    file: ./secrets/mongodb_root_password.txt