global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # All Microservices with Full Observability
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth:3950']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Note: billing-service is a microservice (RabbitMQ), not HTTP service
  # - job_name: 'billing-service'
  #   static_configs:
  #     - targets: ['billing:3951']
  #   metrics_path: '/metrics'
  #   scrape_interval: 15s

  - job_name: 'listings-service'
    static_configs:
      - targets: ['listings:3952']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'markets-service'
    static_configs:
      - targets: ['markets:3953']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'messages-service'
    static_configs:
      - targets: ['messages:3954']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'orders-service'
    static_configs:
      - targets: ['orders:3949']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Frontend Metrics (Next.js app)
  - job_name: 'frontend-service'
    static_configs:
      - targets: ['frontend:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  # System metrics (if using node-exporter)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # MongoDB (if you add MongoDB exporter)
  # - job_name: 'mongodb'
  #   static_configs:
  #     - targets: ['mongodb-exporter:9216']

  # RabbitMQ (if you add RabbitMQ exporter)
  # - job_name: 'rabbitmq'
  #   static_configs:
  #     - targets: ['rabbitmq:15692']
