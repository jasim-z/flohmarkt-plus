services:  
  orders:
    build:
      context: .
      dockerfile: ./apps/orders/Dockerfile
      target: development
    command: pnpm run start:dev orders
    environment:
      - PORT=3949
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
    env_file:
      - apps/orders/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      billing:
        condition: service_started
      auth:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3949:3949'
      
  billing:
    build:
      context: .
      dockerfile: ./apps/billing/Dockerfile
      target: development
    command: pnpm run start:dev billing
    environment:
      - PORT=3951
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
    env_file:
      - apps/billing/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
      auth:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3951:3951'

  auth:
    build:
      context: .
      dockerfile:  ./apps/auth/Dockerfile
      target: development
    command: pnpm run start:dev auth
    environment:
      - PORT=3950
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
      - S3_ENDPOINT=http://minio:9000
      - S3_EXTERNAL_ENDPOINT=http://localhost:9000
      - S3_FORCE_PATH_STYLE=true
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=flohmarkt-uploads
    env_file:
      - apps/auth/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3950:3950'

  listings:
    build:
      context: .
      dockerfile: ./apps/listings/Dockerfile
      target: development
    command: pnpm run start:dev listings
    environment:
      - PORT=3952
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
      - S3_ENDPOINT=http://minio:9000
      - S3_EXTERNAL_ENDPOINT=http://localhost:9000
      - S3_FORCE_PATH_STYLE=true
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=flohmarkt-uploads
    env_file:
      - apps/listings/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
      auth:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3952:3952'

  markets:
    build:
      context: .
      dockerfile: ./apps/markets/Dockerfile
      target: development
    command: pnpm run start:dev markets
    environment:
      - PORT=3953
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
      - S3_ENDPOINT=http://minio:9000
      - S3_EXTERNAL_ENDPOINT=http://localhost:9000
      - S3_FORCE_PATH_STYLE=true
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=flohmarkt-uploads
    env_file:
      - apps/markets/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
      auth:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3953:3953'

  messages:
    build:
      context: .
      dockerfile: ./apps/messages/Dockerfile
      target: development
    command: pnpm run start:dev messages
    environment:
      - PORT=3954
      - NODE_ENV=development
      - JWT_EXPIRATION=3600
      - RABBIT_MQ_URI=amqp://guest:guest@rabbitmq:5672/?heartbeat=30&connection_timeout=30000
    env_file:
      - apps/messages/.env
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary:
        condition: service_started
      mongodb-arbiter:
        condition: service_started
      rabbitmq:
        condition: service_started
      auth:
        condition: service_started
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3954:3954'

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5673:5672"   # AMQP
      - "15672:15672" # HTTP UI

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  mongodb-primary:
    image: mongo:5.0
    command:
      [
        "mongod",
        "--replSet", "rs0",
        "--bind_ip_all",
        "--keyFile", "/data/keyfile"
      ]
    secrets:
      - mongodb_root_username
      - mongodb_root_password
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongodb_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
      - 'mongodb_master_data:/data/db'
      - ./mongo-keyfile:/data/keyfile
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    ports:
      - '27017:27017'
    healthcheck:
      # Use a simple ping to avoid failing before replica set initializes
      test: ["CMD-SHELL", "mongosh --username root --password password123 --authenticationDatabase admin --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  mongodb-secondary:
    image: mongo:5.0
    command:
      [
        "mongod",
        "--replSet", "rs0",
        "--bind_ip_all",
        "--keyFile", "/data/keyfile"
      ]
    depends_on:
      - mongodb-primary
    secrets:
      - mongodb_uri
      - mongodb_root_username
      - mongodb_root_password
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongodb_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
     - ./mongo-keyfile:/data/keyfile

  mongodb-arbiter:
    image: mongo:5.0
    command:
      [
        "mongod",
        "--replSet", "rs0",
        "--bind_ip_all",
        "--keyFile", "/data/keyfile"
      ]
    depends_on:
      - mongodb-primary
    secrets:
      - mongodb_uri
      - mongodb_root_username
      - mongodb_root_password
    environment:
      - MONGO_INITDB_ROOT_USERNAME_FILE=/run/secrets/mongodb_root_username
      - MONGO_INITDB_ROOT_PASSWORD_FILE=/run/secrets/mongodb_root_password
    volumes:
      - ./mongo-keyfile:/data/keyfile

  frontend:
    build:
      context: ./apps/frontend
      target: development
      args:
        - NODE_OPTIONS=--max-old-space-size=1024
    command: pnpm dev:webpack
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=false
      - CHOKIDAR_USEPOLLING=false
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--max-old-space-size=4096
      - NEXT_WATCH_IGNORE="node_modules,\.next,\.git,dist,coverage"
    depends_on:
      - auth
      - listings
      - orders
      - billing
      - messages
    volumes:
      # Mount only source files, not build artifacts or config files
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/public:/app/public
      # Exclude node_modules and build directories to prevent excessive watching
      - /app/node_modules
      - /app/.next
      - /app/.turbo
      - /app/dist
      - /app/coverage
    ports:
      - '3000:3000'
    # Performance and stability improvements
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    restart: unless-stopped
    # Disable health check in development to reduce load
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    #   interval: 120s
    #   timeout: 15s
    #   retries: 2
    #   start_period: 60s

  # Prometheus - Metrics collection and storage
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    depends_on:
      - prometheus

  # Node Exporter - System metrics (optional)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

volumes:
  mongodb_master_data:
    driver: local
  minio_data:
    driver: local
  prometheus-data:
  grafana-data:

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  mongodb_uri:
    file: ./secrets/mongodb_uri.txt
  mongodb_root_username:
    file: ./secrets/mongodb_root_username.txt
  mongodb_root_password:
    file: ./secrets/mongodb_root_password.txt