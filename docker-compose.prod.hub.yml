services:
  auth:
    image: ${DOCKER_USERNAME:-yourusername}/flohmarkt-plus-auth:latest
    platform: linux/amd64
    environment:
      - PORT=3950
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=192
    env_file:
      - .env.production
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      rabbitmq:
        condition: service_started
    ports:
      - '3950:3950'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3950/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  listings:
    image: ${DOCKER_USERNAME:-yourusername}/flohmarkt-plus-listings:latest
    platform: linux/amd64
    environment:
      - PORT=3952
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=192
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    env_file:
      - .env.production
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      auth:
        condition: service_healthy
    ports:
      - '3952:3952'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3952/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  markets:
    image: ${DOCKER_USERNAME:-yourusername}/flohmarkt-plus-markets:latest
    platform: linux/amd64
    environment:
      - PORT=3953
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=192
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    env_file:
      - .env.production
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      auth:
        condition: service_healthy
    ports:
      - '3953:3953'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3953/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  messages:
    image: ${DOCKER_USERNAME:-yourusername}/flohmarkt-plus-messages:latest
    platform: linux/amd64
    environment:
      - PORT=3954
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=192
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    env_file:
      - .env.production
    secrets:
      - jwt_secret
      - mongodb_uri
    depends_on:
      auth:
        condition: service_healthy
    ports:
      - '3954:3954'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3954/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rabbitmq:
    image: rabbitmq:management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-admin}
    ports:
      - "5673:5672"   # AMQP
      - "15672:15672" # HTTP UI
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${DOCKER_USERNAME:-yourusername}/flohmarkt-plus-frontend:latest
    platform: linux/amd64
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--max-old-space-size=384
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
        reservations:
          memory: 256M
          cpus: '0.25'
    env_file:
      - .env.production
    depends_on:
      auth:
        condition: service_healthy
      listings:
        condition: service_healthy
      markets:
        condition: service_healthy
      messages:
        condition: service_healthy
    ports:
      - '3000:3000'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  mongodb_uri:
    file: ./secrets/mongodb_uri.txt

